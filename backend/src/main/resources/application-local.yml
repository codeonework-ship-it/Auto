# ============================================================================
# `local` profile — run the API with NO external dependencies.
# In-memory H2 (PostgreSQL compatibility mode), schema generated from entities,
# Flyway disabled, Kafka listeners off. Data is seeded by LocalDataSeeder.
#
#   mvn spring-boot:run -Dspring-boot.run.profiles=local
#
# Use the default `dev` profile for the real PostgreSQL + Flyway + Kafka stack.
# ============================================================================
spring:
  datasource:
    url: jdbc:h2:mem:autohub;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE
    username: sa
    password: ""
    driver-class-name: org.h2.Driver
  jpa:
    hibernate:
      ddl-auto: create-drop
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: false
  h2:
    console:
      enabled: true
      path: /h2-console
  kafka:
    listener:
      auto-startup: false          # don't try to connect to a broker locally

autohub:
  events:
    kafka-enabled: false           # OutboxRelay just marks events published

logging:
  level:
    com.autohub: DEBUG
