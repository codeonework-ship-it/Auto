# ============================================================================
# AutoHub — full local stack
#   postgres (4 env DBs)  |  kafka (KRaft)  |  backend (Spring Boot)
#   web-app (React)       |  control-panel (React)  |  adminer (DB UI)
#
# Usage:
#   cp .env.example .env
#   docker compose up --build
# ============================================================================

name: autohub

services:
  postgres:
    image: postgres:16-alpine
    container_name: autohub-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-automobiles}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-Automobiles_DB@12345}
      # Bootstrap DB; the init script creates the 4 environment databases.
      POSTGRES_DB: postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-automobiles} -d postgres"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks: [autohub-net]

  kafka:
    image: apache/kafka:3.7.0
    container_name: autohub-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092 || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 10
    networks: [autohub-net]

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: autohub-backend
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_started
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE:-dev}
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB:-AutomobilesDB_Dev}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-automobiles}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-Automobiles_DB@12345}
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      EVENTS_KAFKA_ENABLED: ${EVENTS_KAFKA_ENABLED:-true}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-prod-this-is-a-dev-only-256bit-secret-key-0123456789}
    ports:
      - "${SERVER_PORT:-8080}:8080"
    networks: [autohub-net]

  web-app:
    build:
      context: ./web-app
      dockerfile: Dockerfile
    container_name: autohub-web-app
    depends_on: [backend]
    ports:
      - "${WEB_APP_PORT:-5173}:80"
    networks: [autohub-net]

  control-panel:
    build:
      context: ./control-panel
      dockerfile: Dockerfile
    container_name: autohub-control-panel
    depends_on: [backend]
    ports:
      - "${CONTROL_PANEL_PORT:-5174}:80"
    networks: [autohub-net]

  adminer:
    image: adminer:4
    container_name: autohub-adminer
    depends_on: [postgres]
    ports:
      - "8081:8080"
    networks: [autohub-net]

volumes:
  postgres-data:

networks:
  autohub-net:
    driver: bridge
